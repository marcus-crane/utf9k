name: Deploy (Preview)
on:
  push:
    branches:
      - deployment-hashing
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.0"
          cache: 'pip'
      - name: Generate metadata and build site
        run: ./ci/deploy.sh
      - name: Publish to Bunny Edge CDN
        env:
          BUNNY_STORAGE_ZONE: utf9k-next
          BUNNY_STORAGE_PASSWORD: ${{ secrets.BUNNY_STORAGE_PASSWORD_NEXT }}
          BUNNY_STORAGE_ENDPOINT: syd.storage.bunnycdn.com
          BUNNY_API_KEY: ${{ secrets.BUNNY_GLOBAL_API_KEY }}
          BUNNY_PULL_ZONE_HOST: next.utf9k.net
        run: python ci/bunny-deploy.py
